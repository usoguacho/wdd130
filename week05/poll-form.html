<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles/poll-form.css">
</head>

<body>
    <header>
        <h1>Community Poll</h1>
    </header>

    <main>
        <form>
            <fieldset>
                <legend>Personal Information</legend>

                <div class="form-item column2">
                    <label for="fullname">Full Name</label>
                    <input type="text" id="fullname" name="fullname" required>
                </div>

                <div class="form-item column2">
                    <label for="useremail">Email Address</label>
                    <input type="email" id="useremail" name="useremail" required>
                </div>
            </fieldset>

            <fieldset>
                <legend>Preferences</legend>

                <div class="form-item column1">
                    <label for="browser">Favorite Browser?</label>
                    <select id="browser" name="browser">
                        <option value="chrome">Chrome</option>
                        <option value="safari">Safari</option>
                        <option value="edge">Edge</option>
                        <option value="brave">Brave</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div class="form-item column1">
                    <label for="pet">Household Pet?</label>
                    <input type="checkbox" id="pet" name="pet">
                </div>
            </fieldset>

            <fieldset>
                <legend>About You</legend>

                <div class="form-item column2">
                    <label for="feedback">Places You've Lived</label>
                    <textarea id="feedback" name="feedback" rows="5"
                      placeholder="e.g. Las Vegas, NV | Salt Lake City, UT | Phoenix, AZ"></textarea>
                </div>
            </fieldset>

            <button type="submit">Submit Poll</button>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 Community Poll</p>
    </footer>

</body>

</html>
